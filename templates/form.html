{% extends "base.html" %}
{% block title %}Form | Spam Detection{% endblock %}

{% block content %}
<style>
  /* === Full Background === */
  html, body {
    margin: 0;
    padding: 0;
    background: url('https://tse4.mm.bing.net/th/id/OIP.lwzRN4WGhPpRr8K45Y5BgAHaE8?pid=Api&P=0&h=180') no-repeat center center/cover;
    height: 100%;
    color: #fff !important;
    overflow-x: hidden;
  }

  .form-bg {
    min-height: 100vh;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }

  /* === Form Container === */
  .form-section {
    background: rgba(20, 20, 20, 0.92);
    backdrop-filter: blur(10px);
    max-width: 600px;
    width: 100%;
    border: 2px solid #ffc107;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.25);
    padding: 40px;
    transition: all 0.3s ease;
  }

  .form-section:hover {
    box-shadow: 0 0 45px rgba(255, 215, 0, 0.4);
    transform: translateY(-5px);
  }

  /* === Header === */
  .form-header h2 {
    color: #ffc107;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .form-header p {
    color: #bbb;
  }

  /* === Input Fields === */
  .form-control, .form-select {
    background-color: #111;
    border: 1px solid #ffc107;
    color: #fff;
    font-size: 1rem;
  }

  .form-control::placeholder {
    color: #aaa;
  }

  .form-control:focus, .form-select:focus {
    border-color: #ffd54f;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    background-color: #151515;
  }

  label {
    color: #fff;
    font-weight: 600;
  }

  /* === Button === */
  .btn-submit {
    background: linear-gradient(90deg, #ffd700, #ffb300);
    color: #000;
    border: none;
    border-radius: 10px;
    transition: 0.3s ease-in-out;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .btn-submit:hover {
    background: linear-gradient(90deg, #ffb300, #ffd700);
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    transform: scale(1.05);
  }

  /* === Responsive === */
  @media (max-width: 768px) {
    .form-section {
      padding: 25px 20px;
    }
    .form-header h2 {
      font-size: 1.6rem;
    }
  }
</style>

<div class="form-bg">
  <div class="form-section">
    <div class="form-header text-center mb-4">
      <h2>Submit Your Query</h2>
      <p class="text-white">Tell us your name and the issue you are facing below.</p>
    </div>

    <form action="{{ url_for('form') }}" method="POST">

      <div class="mb-3">
        <label class="form-label">Write your message to detect spam</label>
        <textarea style="color: aliceblue;" name="problem" rows="4" class="form-control form-control-lg" placeholder="Describe your problem clearly..." required></textarea>
      </div>

      <button type="submit" class="btn btn-submit btn-lg w-100">Submit ✉️</button>
    </form>
  </div>
</div>

{% endblock %}
